name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests, type-check]
    # E2E uniquement sur push main — évite de surcharger les PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Playwright via smoke-test API
        run: |
          curl -sf -X POST https://portal.moondust.cloud/api/playwright-run \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMOKE_TEST_TOKEN }}" \
            -d '{}' | tee playwright-result.json
          # Fail si des tests ont échoué
          python3 -c "
          import json, sys
          r = json.load(open('playwright-result.json'))
          failed = [t for t in r.get('tests', []) if t.get('status') != 'passed']
          if failed:
            print('FAILED:', [t['title'] for t in failed])
            sys.exit(1)
          print('All tests passed')
          "
