name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ── FRONTEND (gateway Next.js) ────────────────────────────────────

jobs:
  frontend-typecheck:
    name: Frontend — TypeScript
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'frontend/') ||
      contains(github.event.head_commit.modified, 'contracts/')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-test:
    name: Frontend — Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

# ── MODULE SERVICES ───────────────────────────────────────────────

  svc-crm:
    name: Service CRM — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/crm/package-lock.json
      - run: npm ci
      - run: npm test
      - name: TypeScript build check
        run: npx tsc --noEmit

  svc-sales:
    name: Service Sales — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sales
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/sales/package-lock.json
      - run: npm ci
      - run: npm test
      - name: TypeScript build check
        run: npx tsc --noEmit

  svc-projects:
    name: Service Projects — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/projects
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/projects/package-lock.json
      - run: npm ci
      - run: npm test
      - name: TypeScript build check
        run: npx tsc --noEmit

  svc-procurement:
    name: Service Procurement — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/procurement
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/procurement/package-lock.json
      - run: npm ci
      - run: npm test
      - name: TypeScript build check
        run: npx tsc --noEmit

# ── E2E (sur push main uniquement, après tous les tests) ──────────

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend-test, svc-crm, svc-sales, svc-projects, svc-procurement]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Playwright via smoke-test API
        run: |
          curl -sf -X POST https://portal.moondust.cloud/api/playwright-run \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMOKE_TEST_TOKEN }}" \
            -d '{}' | tee playwright-result.json
          python3 -c "
          import json, sys
          r = json.load(open('playwright-result.json'))
          failed = [t for t in r.get('tests', []) if t.get('status') != 'passed']
          if failed:
            print('FAILED:', [t['title'] for t in failed])
            sys.exit(1)
          print('All tests passed')
          "

# ── DOCKER BUILD CHECK (par module, sur push main) ────────────────

  docker-crm:
    name: Docker — svc-crm
    runs-on: ubuntu-latest
    needs: svc-crm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t erp-svc-crm:ci services/crm

  docker-sales:
    name: Docker — svc-sales
    runs-on: ubuntu-latest
    needs: svc-sales
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t erp-svc-sales:ci services/sales

  docker-projects:
    name: Docker — svc-projects
    runs-on: ubuntu-latest
    needs: svc-projects
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t erp-svc-projects:ci services/projects

  docker-procurement:
    name: Docker — svc-procurement
    runs-on: ubuntu-latest
    needs: svc-procurement
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t erp-svc-procurement:ci services/procurement
