services:

  # ── 1. POSTGRESQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── 2. NEXT.JS (Gateway UI) ───────────────────────────────────
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NEXTAUTH_SECRET:           ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:              https://${DOMAIN_APP}
      NODE_ENV:                  production
      SMTP_HOST:                 ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:                 ${SMTP_PORT:-587}
      SMTP_SECURE:               ${SMTP_SECURE:-false}
      SMTP_USER:                 ${SMTP_USER:-}
      SMTP_PASS:                 ${SMTP_PASS:-}
      SMTP_FROM:                 ${SMTP_FROM:-MoonDust ERP <no-reply@moondust.cloud>}
      POSTGRES_HOST:             db
      POSTGRES_PORT:             5432
      POSTGRES_DB:               ${POSTGRES_DB}
      POSTGRES_USER:             ${POSTGRES_USER}
      POSTGRES_PASSWORD:         ${POSTGRES_PASSWORD}
      ACTIVEPIECES_INTERNAL_URL: ${ACTIVEPIECES_INTERNAL_URL}
      NEXT_PUBLIC_ACTIVEPIECES_URL: https://${DOMAIN_AUTOMATE}
      AP_API_KEY:                ${AP_API_KEY}
      AP_CHAT_FLOW_WEBHOOK:      ${AP_CHAT_FLOW_WEBHOOK}
      AP_SIRENE_FLOW_WEBHOOK:    ${AP_SIRENE_FLOW_WEBHOOK:-}
      GROQ_API_KEY:              ${GROQ_API_KEY}
      GROQ_MODEL:                ${GROQ_MODEL}
      SMOKE_TEST_TOKEN:          ${SMOKE_TEST_TOKEN}
      SERVICE_CRM_URL:           http://svc-crm:3101
      SERVICE_SALES_URL:         http://svc-sales:3102
      SERVICE_PROJECTS_URL:      http://svc-projects:3103
      SERVICE_PROCUREMENT_URL:   http://svc-procurement:3104
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - activepieces
      - svc-crm
      - svc-sales
      - svc-projects
      - svc-procurement
    networks:
      - frontend
      - backend

  # ── MODULE SERVICES ───────────────────────────────────────────

  svc-crm:
    build:
      context: ./services/crm
      dockerfile: Dockerfile
    image: erp-svc-crm:0.1.2
    restart: unless-stopped
    environment:
      PORT:              "3101"
      POSTGRES_HOST:     db
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3101/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  svc-sales:
    build:
      context: ./services/sales
      dockerfile: Dockerfile
    image: erp-svc-sales:0.1.2
    restart: unless-stopped
    environment:
      PORT:              "3102"
      POSTGRES_HOST:     db
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3102/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  svc-projects:
    build:
      context: ./services/projects
      dockerfile: Dockerfile
    image: erp-svc-projects:0.1.2
    restart: unless-stopped
    environment:
      PORT:              "3103"
      POSTGRES_HOST:     db
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3103/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  svc-procurement:
    build:
      context: ./services/procurement
      dockerfile: Dockerfile
    image: erp-svc-procurement:0.1.2
    restart: unless-stopped
    environment:
      PORT:              "3104"
      POSTGRES_HOST:     db
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3104/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 3. REDIS (Queue Activepieces) ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── 4. ACTIVEPIECES (Bus d'événements + intégrations externes) ─
  activepieces:
    image: activepieces/activepieces:latest
    restart: unless-stopped
    environment:
      AP_ENGINE_EXECUTABLE_PATH:   dist/packages/engine/main.js
      AP_API_KEY:                  ${AP_API_KEY}
      AP_ENCRYPTION_KEY:           ${AP_ENCRYPTION_KEY}
      AP_JWT_SECRET:               ${AP_JWT_SECRET}
      AP_FRONTEND_URL:             https://${DOMAIN_AUTOMATE}
      AP_POSTGRES_DATABASE:        ${AP_POSTGRES_DATABASE}
      AP_POSTGRES_HOST:            db
      AP_POSTGRES_PORT:            5432
      AP_POSTGRES_USERNAME:        ${POSTGRES_USER}
      AP_POSTGRES_PASSWORD:        ${POSTGRES_PASSWORD}
      AP_REDIS_URL:                redis://redis:6379
      AP_EXECUTION_MODE:           UNSANDBOXED
      AP_SANDBOX_RUN_TIME_SECONDS: "600"
      AP_TELEMETRY_ENABLED:        "false"
      AP_SIGN_UP_ENABLED:          "true"
      AP_TEMPLATES_SOURCE_URL:     ""
    volumes:
      - activepieces_data:/root/.activepieces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend

  # ── 5. PLAYWRIGHT (Runner de tests E2E) ───────────────────────
  playwright:
    build:
      context: ./playwright
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ERP_EMAIL:    hadi@hadi.com
      ERP_PASSWORD: hadi@hadi.com
    volumes:
      - playwright_results:/results
    networks:
      - frontend
      - backend

  # ── 6. POSTGREST (Accès tables legacy — transitoire) ──────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    environment:
      PGRST_DB_URI:         postgresql://authenticator:${POSTGREST_DB_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS:     public
      PGRST_DB_ANON_ROLE:   postgrest_anon
      PGRST_JWT_SECRET:     ${POSTGREST_JWT_SECRET}
      PGRST_DB_PRE_REQUEST: set_tenant_context
      PGRST_SERVER_PORT:    "3001"
      PGRST_OPENAPI_MODE:   disabled
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # ── 7. PAYROLL ETL (Service Python FastAPI) ───────────────────
  payroll:
    build:
      context: /home/ZouZou/mon_excel_app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # ── 8. CADDY (Reverse proxy + TLS wildcard Cloudflare DNS-01) ─
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nextjs
      - payroll
      - activepieces
      - pgadmin
    networks:
      - frontend

  # ── 9. PGADMIN (Admin DB) ─────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:                   ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD:                ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE:              "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend
      - frontend

# ── VOLUMES ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  uploads_data:
  redis_data:
  activepieces_data:
  playwright_results:
  pgadmin_data:

# ── RÉSEAUX ───────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
